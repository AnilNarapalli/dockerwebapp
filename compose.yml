---
version: "3"
services:
 devopsdb:
   image: anilkumarnarapalli/automation:db
   ports:
     - "3306:3306"
   deploy:
     replicas: 3
   networks:
     -mynetwork

 application:
   image: anilkumarnarapalli/automation:app
   ports:
     - "1111:8080"
   deploy:
      replicas: 3
   networks:
     -mynetwork
   depends_on:
     - "devopsdb"
networks:
  mynetwork:
    driver:overlay
  
